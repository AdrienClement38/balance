name: Deploy to AlwaysData

# Build dans GitHub Actions (l'hébergement AlwaysData n'a pas assez de RAM pour
# compiler), puis envoi du dist/ en SSH et redémarrage du site via l'API.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-alwaysdata
  cancel-in-progress: true

env:
  REMOTE: ac-balance@ssh-ac-balance.alwaysdata.net
  SSH_HOST: ssh-ac-balance.alwaysdata.net
  APP_DIR: www/balance
  SITE_ID: "1054544"
  ACCOUNT: ac-balance

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ALWAYSDATA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload build to AlwaysData
        run: |
          SSH="ssh -i ~/.ssh/id_ed25519"
          # --delete : nettoie les anciens assets hashés / fichiers compilés obsolètes
          rsync -az --delete -e "$SSH" frontend/dist/ "$REMOTE:$APP_DIR/frontend/dist/"
          rsync -az --delete -e "$SSH" backend/dist/  "$REMOTE:$APP_DIR/backend/dist/"
          # package.json/lock pour aligner les dépendances runtime si elles changent
          rsync -az -e "$SSH" backend/package.json backend/package-lock.json "$REMOTE:$APP_DIR/backend/"

      - name: Install runtime deps & restart the site
        run: |
          ssh -i ~/.ssh/id_ed25519 "$REMOTE" \
            "cd ~/$APP_DIR/backend && npm install --omit=dev --no-audit --no-fund"
          curl -fsS -X POST --basic \
            --user "${{ secrets.ALWAYSDATA_API_KEY }} account=$ACCOUNT:" \
            "https://api.alwaysdata.com/v1/site/$SITE_ID/restart/"
          echo "Déploiement terminé."

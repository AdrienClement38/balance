name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Un seul déploiement à la fois.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Build · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Frontend (build + tests)
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm test
      - name: Backend (build + tests)
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm test

  deploy:
    name: Déploiement AlwaysData
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ssh-ac-balance.alwaysdata.net
      SSH_USER: ac-balance
      REMOTE_DIR: www/balance
      SITE_URL: https://ac-balance.alwaysdata.net
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend + backend
        run: |
          (cd frontend && npm ci && npm run build)
          (cd backend  && npm ci && npm run build)

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALWAYSDATA_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Envoyer les artefacts (rsync)
        run: |
          RSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"
          # rsync ne crée pas les dossiers parents -> on les crée d'abord.
          $RSH "$SSH_USER@$SSH_HOST" "mkdir -p '$REMOTE_DIR/frontend/dist/assets' '$REMOTE_DIR/backend/dist'"
          # Assets hashés en ADDITIF (un onglet déjà ouvert garde ses chunks après un déploiement).
          rsync -az -e "$RSH" frontend/dist/assets/ "$SSH_USER@$SSH_HOST:$REMOTE_DIR/frontend/dist/assets/"
          # Reste du frontend (index.html, sw.js, manifest, icônes…) : --delete propre, assets/ exclu.
          rsync -az --delete --exclude='/assets/' -e "$RSH" frontend/dist/ "$SSH_USER@$SSH_HOST:$REMOTE_DIR/frontend/dist/"
          # Backend compilé (inclut dist/db/migrations) + package.json/lock pour le runtime.
          rsync -az --delete -e "$RSH" backend/dist/ "$SSH_USER@$SSH_HOST:$REMOTE_DIR/backend/dist/"
          rsync -az          -e "$RSH" backend/package.json backend/package-lock.json "$SSH_USER@$SSH_HOST:$REMOTE_DIR/backend/"

      - name: Installer le runtime + redémarrer
        run: |
          # Deps runtime seulement (ni Vite, ni tsc, ni sharp), puis on tue le process :
          # AlwaysData le respawn avec le nouveau code. Le motif [d]ist/server.js matche le
          # serveur SANS matcher la commande pkill elle-même. Migrations appliquées au démarrage.
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "cd $REMOTE_DIR/backend && npm install --omit=dev --no-audit --no-fund && (pkill -f '[d]ist/server.js' || true)"

      - name: Vérifier que le site répond
        run: |
          sleep 3
          curl -fsS --retry 6 --retry-delay 3 "$SITE_URL/healthz" > /dev/null
          echo "Déploiement OK : $SITE_URL répond."
